<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Personal Music Library Exporter</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;max-width:760px;margin:0 auto;padding:24px;background:#121212;color:#fff}
  .card{background:#1f1f1f;border-radius:16px;padding:18px;margin:16px 0}
  input,button{width:100%;box-sizing:border-box;font-size:16px;border-radius:10px;padding:14px;margin:8px 0}
  input{border:1px solid #555;background:#111;color:#fff}
  button{border:0;background:#1ed760;color:#000;font-weight:700}
  button.secondary{background:#eee}
  button:disabled{opacity:.5}
  code{word-break:break-all}
  #status{white-space:pre-wrap;line-height:1.4}
  small{color:#bbb}
</style>
</head>
<body>
<h1>Personal Music Library Exporter</h1>
<p>Private browser-only exporter for your own Spotify Saved Tracks.</p>

<div class="card">
  <label><b>Spotify Client ID</b></label>
  <input id="clientId" autocomplete="off" placeholder="Paste your Client ID">
  <small>Your Client ID is stored only in this browser. Do not paste a Client Secret.</small>
</div>

<div class="card">
  <b>Redirect URI to register in Spotify</b>
  <p><code id="redirect"></code></p>
  <small>This must match exactly in your Spotify app settings.</small>
</div>

<button id="login">1. Sign in with Spotify</button>
<button id="export" disabled>2. Export all Liked Songs</button>

<div class="card">
  <b>Status</b>
  <div id="status">Ready.</div>
</div>

<script>
const $ = id => document.getElementById(id);
const redirectUri = location.origin + location.pathname;
$("redirect").textContent = redirectUri;
$("clientId").value = localStorage.getItem("spotify_client_id") || "";

function setStatus(s){ $("status").textContent = s; }
function b64url(bytes){
  return btoa(String.fromCharCode(...new Uint8Array(bytes)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}
function randomVerifier(){
  const a = new Uint8Array(64); crypto.getRandomValues(a); return b64url(a);
}
async function challenge(v){
  return b64url(await crypto.subtle.digest("SHA-256", new TextEncoder().encode(v)));
}

$("login").onclick = async () => {
  const clientId = $("clientId").value.trim();
  if(!clientId) return setStatus("Paste your Client ID first.");
  localStorage.setItem("spotify_client_id", clientId);
  const verifier = randomVerifier();
  sessionStorage.setItem("pkce_verifier", verifier);
  const state = randomVerifier().slice(0,32);
  sessionStorage.setItem("oauth_state", state);
  const params = new URLSearchParams({
    client_id: clientId,
    response_type: "code",
    redirect_uri: redirectUri,
    scope: "user-library-read",
    code_challenge_method: "S256",
    code_challenge: await challenge(verifier),
    state
  });
  location.href = "https://accounts.spotify.com/authorize?" + params;
};

async function exchangeCode(code){
  const clientId = localStorage.getItem("spotify_client_id");
  const verifier = sessionStorage.getItem("pkce_verifier");
  const body = new URLSearchParams({
    client_id: clientId,
    grant_type: "authorization_code",
    code,
    redirect_uri: redirectUri,
    code_verifier: verifier
  });
  const r = await fetch("https://accounts.spotify.com/api/token",{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body
  });
  if(!r.ok) throw new Error("Token exchange failed: " + await r.text());
  return r.json();
}

async function init(){
  const p = new URLSearchParams(location.search);
  const err = p.get("error");
  if(err) return setStatus("Spotify authorization error: " + err);
  const code = p.get("code");
  if(!code) return;
  if(p.get("state") !== sessionStorage.getItem("oauth_state"))
    return setStatus("Security check failed: OAuth state mismatch.");
  try{
    setStatus("Finishing Spotify sign-in…");
    const tok = await exchangeCode(code);
    sessionStorage.setItem("access_token", tok.access_token);
    history.replaceState({}, "", redirectUri);
    $("export").disabled = false;
    setStatus("Signed in. Tap Export all Liked Songs.");
  }catch(e){ setStatus(e.message); }
}

function csvEscape(v){
  const s = String(v ?? "");
  return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
}
function download(name, text, type){
  const blob = new Blob([text], {type});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

$("export").onclick = async () => {
  const token = sessionStorage.getItem("access_token");
  if(!token) return setStatus("Sign in again first.");
  try{
    let url = "https://api.spotify.com/v1/me/tracks?limit=50";
    let items = [], page = 0;
    while(url){
      page++;
      setStatus(`Fetching page ${page}… ${items.length} tracks collected.`);
      const r = await fetch(url,{headers:{Authorization:"Bearer "+token}});
      if(!r.ok) throw new Error("Spotify API error: " + r.status + " " + await r.text());
      const data = await r.json();
      items.push(...data.items);
      url = data.next;
    }
    const clean = items.map(x => ({
      added_at:x.added_at,
      track_name:x.track?.name ?? "",
      artists:(x.track?.artists ?? []).map(a=>a.name).join("; "),
      album:x.track?.album?.name ?? "",
      release_date:x.track?.album?.release_date ?? "",
      duration_ms:x.track?.duration_ms ?? "",
      explicit:x.track?.explicit ?? "",
      popularity:x.track?.popularity ?? "",
      spotify_track_id:x.track?.id ?? "",
      spotify_uri:x.track?.uri ?? ""
    }));
    const headers = Object.keys(clean[0] || {added_at:"",track_name:"",artists:"",album:"",release_date:"",duration_ms:"",explicit:"",popularity:"",spotify_track_id:"",spotify_uri:""});
    const csv = [headers.join(","), ...clean.map(r=>headers.map(h=>csvEscape(r[h])).join(","))].join("\n");
    download("spotify_liked_songs_raw.json", JSON.stringify(items,null,2), "application/json");
    setTimeout(()=>download("spotify_liked_songs_clean.csv", csv, "text/csv;charset=utf-8"),700);
    setStatus(`Done. Exported ${items.length} Liked Songs.\nTwo files created: raw JSON and clean CSV.`);
  }catch(e){ setStatus(e.message); }
};

init();
</script>
</body>
</html>
